<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace's Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <header class="p-6 bg-orange-600 text-white text-center">
    <h1 class="text-3xl font-bold">Grace's Kitchen</h1>
    <p class="text-sm">Lasting Taste</p>

    <div class="mt-4 flex justify-center">
      <input 
        id="searchInput"
        type="text"
        placeholder="Search foods..."
        class="w-full max-w-md p-2 rounded text-black"
      />
    </div>
  </header>

  <div id="loader" class="text-center py-10 hidden">
    <p class="animate-pulse text-orange-600 text-lg">Loading foods...</p>
  </div>

  <main class="p-6">
    <div id="foodsGrid" class="grid md:grid-cols-3 gap-6"></div>
  </main>
  

  <script src="script.js"></script>
</body>
</html>
