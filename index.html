<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Nigerian Food Explorer</title>
</head>

<body class="bg-gray-50">

<!-- Notification -->
<div id="toast"
class="hidden fixed top-5 left-1/2 -translate-x-1/2
bg-orange-500 text-white px-6 py-3 rounded-lg shadow-lg z-50">
</div>

<!-- Filters -->
<div class="p-6 bg-white shadow">

<input id="searchInput"
placeholder="Search food..."
class="border p-2 mr-4">

<select id="categoryFilter" class="border p-2 mr-4">
<option value="">All Categories</option>
</select>

<select id="regionFilter" class="border p-2 mr-4">
<option value="">All Regions</option>
</select>

<label class="mr-4">
<input type="checkbox" id="vegFilter"> Vegetarian
</label>

<label class="mr-4">
<input type="checkbox" id="spicyFilter"> Spicy
</label>

<button id="clearFilters"
class="bg-orange-500 text-white px-4 py-2 rounded">
Clear Filters
</button>

</div>

<!-- Food grid -->
<div id="foodGrid"
class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 p-6">
</div>

<!-- Modal -->
<div id="modal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">

<div class="bg-white p-6 rounded-lg w-[500px] relative">

<button id="closeModal"
class="absolute top-3 right-4 text-xl">
✕
</button>

<div id="modalContent"></div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
